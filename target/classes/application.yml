server:
  port: 8080

spring:
  application:
    name: StockMaster
  datasource:
    url: jdbc:mysql://localhost:3306/stock_master?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

jwt:
  secret: StockMaster2026@SecurityKeyForJWTEncryption
  expiration: 86400000
  refresh-expiration: 604800000

file:
  upload:
    path: /tmp/uploads
    avatar:
      max-size: 2097152
    image:
      max-size: 5242880

logging:
  level:
    com.stockmaster: debug
    org.springframework.security: info
